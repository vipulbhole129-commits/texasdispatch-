kind = "web"
previewPath = "/"
title = "Texas Plumber AI Receptionist"
version = "1.0.0"
id = "artifacts/plumber-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24121

[services.development]
run = "pnpm --filter @workspace/plumber-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/plumber-ai", "run", "build" ]
publicDir = "artifacts/plumber-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24121"
BASE_PATH = "/"
